<section class="panel">
  <h3>Ranking</h3>

  <div class="list" *ngIf="topUsers$ | async as users">
    <p class="empty" *ngIf="users.length === 0">Ainda não há participantes no ranking.</p>
    <article class="row" *ngFor="let user of users">
      <img
        class="avatar"
        *ngIf="user.photoURL; else fallbackAvatar"
        [src]="user.photoURL"
        [alt]="'Foto de ' + (user.displayName || 'jogador')"
        loading="lazy"
        referrerpolicy="no-referrer"
      />
      <ng-template #fallbackAvatar>
        <span class="avatar avatar-fallback">{{ (user.displayName || user.userId).charAt(0) }}</span>
      </ng-template>

      <span class="name">{{ user.displayName || user.userId }}</span>

      <div class="tags">
        <app-xp-tag [value]="user.totalXp" label="XP" [showPlus]="false" variant="gold" />
        <app-xp-tag [value]="user.streak || 0" label="dias 🔥" [showPlus]="false" variant="streak" />
      </div>
    </article>
  </div>
</section>
