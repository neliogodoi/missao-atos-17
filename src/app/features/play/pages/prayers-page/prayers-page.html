<section class="prayers-page">
  <app-mission-card [title]="'Corrente de Oração'" [subtitle]="'Envie apoio espiritual para um colega'" status="active">
    <div body class="prayers-body">
      <form [formGroup]="form" (ngSubmit)="onSendPrayer()" class="form">
        <label>
          UID do colega
          <input type="text" formControlName="recipientUid" placeholder="Cole o UID do colega" />
        </label>

        <label>
          Sua oração
          <textarea
            rows="4"
            formControlName="message"
            placeholder="Escreva uma oração de apoio (mín. 10 caracteres)"
          ></textarea>
        </label>

        <button type="submit" [disabled]="sending() || form.invalid">
          {{ sending() ? 'Enviando...' : 'Enviar oração' }}
        </button>
      </form>

      <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

      <section class="prayer-list-block">
        <h4>Recebidas</h4>
        <div class="list" *ngIf="received$ | async as received">
          <p class="empty-state" *ngIf="received.length === 0">Nenhuma oração recebida ainda.</p>
          <article class="prayer-item" *ngFor="let prayer of received">
            <p class="message">{{ prayer.message }}</p>
            <p class="meta">de {{ prayer.senderUid }} · {{ formatCreatedAt(prayer.createdAt) }}</p>
          </article>
        </div>
      </section>

      <section class="prayer-list-block">
        <h4>Enviadas</h4>
        <div class="list" *ngIf="sent$ | async as sent">
          <p class="empty-state" *ngIf="sent.length === 0">Você ainda não enviou orações.</p>
          <article class="prayer-item" *ngFor="let prayer of sent">
            <p class="message">{{ prayer.message }}</p>
            <p class="meta">para {{ prayer.recipientUid }} · {{ formatCreatedAt(prayer.createdAt) }}</p>
          </article>
        </div>
      </section>
    </div>
  </app-mission-card>
</section>
