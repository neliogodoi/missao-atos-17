<section class="profile-page">
  <p *ngIf="loading()" class="loading-text">Carregando perfil...</p>

  <ng-container *ngIf="!loading()">
    <section class="profile-card">
      <h3>Meu Perfil</h3>

      <div class="meta">
        <p><strong>Nome:</strong> {{ initialDisplayName() || '-' }}</p>
        <p><strong>Email:</strong> {{ email() || '-' }}</p>
        <p><strong>Role:</strong> {{ role() }}</p>
        <p><strong>UID:</strong> {{ uid() }}</p>
      </div>

      <div class="tags">
        <app-xp-tag [value]="totalXp()" label="XP 🪙" [showPlus]="false" />
        <app-xp-tag [value]="streak()" label="dias 🔥" [showPlus]="false" variant="streak" />
      </div>

      <section class="armor-progress">
        <h4>Progresso da Armadura</h4>
        <div class="armor-list">
          <article class="armor-item" *ngFor="let item of armorProgress()" tabindex="0">
            <img [src]="item.imageSrc" [alt]="item.itemName" />
            <div class="armor-overlay">
              <div class="armor-content">
                <div class="armor-head">
                  <strong>{{ item.itemName }}</strong>
                  <span>{{ item.earned }}/{{ item.target }}</span>
                </div>
                <p class="armor-percent">{{ item.progressPercent }}%</p>
                <div class="progress-track">
                  <div class="progress-fill" [style.width.%]="item.progressPercent"></div>
                </div>
              </div>
            </div>
          </article>
        </div>
      </section>

      <form [formGroup]="form" (ngSubmit)="onSave()" class="form">
        <label>
          Nome de exibição
          <input type="text" formControlName="displayName" />
        </label>

        <label>
          URL da foto
          <input type="url" formControlName="photoURL" placeholder="https://..." />
        </label>

        <button type="submit" [disabled]="saving() || !isDirty() || form.invalid">
          {{ saving() ? 'Salvando...' : 'Salvar perfil' }}
        </button>
      </form>

      <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>
      <p class="success" *ngIf="successMessage()">{{ successMessage() }}</p>
    </section>
  </ng-container>
</section>
