<section class="login-page">
  <article class="login-card">
    <p class="eyebrow">Relatório da missão</p>
    <h1 class="font-title">Missão: Atos 17</h1>
    <p class="tagline">Entre na missão. Um passo por dia.</p>

    <div class="actions">
      <button class="btn btn-primary google-btn" type="button" (click)="onLoginWithGoogle()" [disabled]="loading()">
        {{ loading() ? 'Entrando...' : 'Entrar com Google' }}
      </button>
    </div>

    <p class="helper">Use sua conta Google para manter seu progresso seguro.</p>
    <p class="helper">Acesso liberado apenas para jogadores autorizados da missão.</p>

    <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>
  </article>
</section>
