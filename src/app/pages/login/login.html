<section class="login-page">
  <article class="login-card">
    <p class="eyebrow">Relatório da missão</p>
    <h1 class="font-title">Missão: Atos 17</h1>
    <p class="tagline">Entre na missão. Um passo por dia.</p>

    <div class="actions">
      <button class="btn btn-primary google-btn" type="button" (click)="onLoginWithGoogle()" [disabled]="loading()">
        {{ loading() ? 'Entrando...' : 'Entrar com Google' }}
      </button>
    </div>

    <div class="divider"><span>ou</span></div>

    <div class="mode-switch">
      <button
        type="button"
        class="btn mode-btn"
        [class.mode-btn-active]="formMode() === 'login'"
        (click)="setFormMode('login')"
        [disabled]="loading()"
      >
        Entrar
      </button>
      <button
        type="button"
        class="btn mode-btn"
        [class.mode-btn-active]="formMode() === 'register'"
        (click)="setFormMode('register')"
        [disabled]="loading()"
      >
        Criar conta
      </button>
    </div>

    <div class="email-auth" *ngIf="formMode() === 'login'">
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          [value]="loginEmail()"
          (input)="onEmailInput($any($event.target).value)"
          [disabled]="loading()"
          autocomplete="email"
          placeholder="seuemail@exemplo.com"
        />
      </label>

      <label class="field">
        <span>Senha</span>
        <input
          type="password"
          [value]="loginPassword()"
          (input)="onPasswordInput($any($event.target).value)"
          [disabled]="loading()"
          autocomplete="current-password"
          placeholder="Sua senha"
        />
      </label>

      <button class="btn btn-primary email-btn" type="button" (click)="onLoginWithEmail()" [disabled]="loading()">
        Entrar com Email
      </button>
    </div>

    <div class="email-auth" *ngIf="formMode() === 'register'">
      <label class="field">
        <span>Nome</span>
        <input
          type="text"
          [value]="registerName()"
          (input)="onRegisterNameInput($any($event.target).value)"
          [disabled]="loading()"
          autocomplete="name"
          placeholder="Seu nome"
        />
      </label>

      <label class="field">
        <span>Email</span>
        <input
          type="email"
          [value]="registerEmail()"
          (input)="onRegisterEmailInput($any($event.target).value)"
          [disabled]="loading()"
          autocomplete="email"
          placeholder="seuemail@exemplo.com"
        />
      </label>

      <label class="field">
        <span>Senha</span>
        <input
          type="password"
          [value]="registerPassword()"
          (input)="onRegisterPasswordInput($any($event.target).value)"
          [disabled]="loading()"
          autocomplete="new-password"
          placeholder="Mínimo 6 caracteres"
        />
      </label>

      <label class="field">
        <span>Confirmar senha</span>
        <input
          type="password"
          [value]="registerPasswordConfirm()"
          (input)="onRegisterPasswordConfirmInput($any($event.target).value)"
          [disabled]="loading()"
          autocomplete="new-password"
          placeholder="Repita sua senha"
        />
      </label>

      <button class="btn btn-secondary email-btn" type="button" (click)="onRegisterWithEmail()" [disabled]="loading()">
        Criar conta com Email
      </button>
    </div>

    <p class="helper">Use Google ou Email/Senha para manter seu progresso seguro.</p>
    <p class="helper">Acesso liberado apenas para peregrinos autorizados da missão.</p>

    <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>
  </article>
</section>
